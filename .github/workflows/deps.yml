name: 'Dependencies Updator'
'on':
  schedule:
    -
      cron: '11 23 * * *'
  workflow_dispatch:
env:
  PHP_VERSION: '8.4'
  NODE_VERSION: '24'
  PACKAGE_COOLDOWN_DAYS: '3'
  LLM_API_KEY: ${{ secrets.SAKURA_AI_ENGINE_API_KEY }}
  LLM_API_ENDPOINT: 'https://api.ai.sakura.ad.jp/v1/chat/completions'
  LLM_MODEL: 'preview/Kimi-K2.6'
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
jobs:
  update:
    name: 'Update dependencies'
    runs-on: ubuntu-24.04
    steps:
      -
        name: 'Check out the source'
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      -
        name: 'Set up PHP'
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ env.PHP_VERSION }}
      -
        name: 'Set up Node'
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      -
        name: 'Install dependencies'
        run: |
          composer install --prefer-dist
          npm clean-install
      -
        name: 'Basic setup the app'
        run: |
          apt update && apt install -y libxml2-utils optipng
          make init-no-resource
      -
        name: 'Set PHP version latest'
        run: |
          PHP_VERSION=`./yii php/latest-version`
          composer config platform.php $PHP_VERSION
      -
        name: 'Update composer packages (app)'
        run: |
          composer update
          composer bump
          composer normalize
      -
        name: 'Update composer packages (deploy)'
        run: |
          composer update
          composer bump
          composer normalize
        working-directory: deploy
      -
        name: 'Update JavaScript packages'
        run: |
          npx updates --update --cooldown ${{ env.PACKAGE_COOLDOWN_DAYS }}d --minor
          rm -rf node_modules package-lock.json
          npm install --min-release-age=${{ env.PACKAGE_COOLDOWN_DAYS }}
      -
        name: 'Check changed'
        run: |
          git add \
            ./composer.json \
            ./composer.lock \
            ./package.json \
            ./package-lock.json \
            deploy/composer.json \
            deploy/composer.lock

          git update-index -q --refresh
          if [ -z "$(git diff-index --name-only HEAD --)" ]; then
            echo "Nothing changed"
            echo "changed=0" >> $GITHUB_ENV
          else
            echo "Something changed"
            echo "changed=1" >> $GITHUB_ENV
          fi
      -
        name: 'Generate PR body'
        if: "${{ env.changed == '1' }}"
        run: |
          set +e
          body="$(./yii deps/summarize-changes)"
          rc=$?
          set -e
          if [ "$rc" -ne 0 ] || [ -z "$body" ]; then
            echo "[warn] summarize-changes failed (rc=$rc) or returned empty; using fallback body"
            body='This is an automated pull-request'
          fi
          printf '%s\n' "$body" > "$RUNNER_TEMP/pr_body.md"
          echo "PR_BODY_PATH=$RUNNER_TEMP/pr_body.md" >> "$GITHUB_ENV"
      -
        name: 'Create Pull Request'
        if: "${{ env.changed == '1' }}"
        uses: peter-evans/create-pull-request@v8
        with:
          assignees: fetus-hina
          author: 'AIZAWA Hina <hina@fetus.jp>'
          body-path: ${{ env.PR_BODY_PATH }}
          branch: autoupdate-depends
          commit-message: 'Update dependencies'
          delete-branch: true
          draft: false
          labels: dependencies
          reviewers: fetus-hina
          signoff: false
          title: 'Update dependencies'
